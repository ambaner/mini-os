name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup NASM
      uses: ilammy/setup-nasm@v1

    - name: Build mini-os
      run: .\build.bat
      shell: cmd

    - name: Package release
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        $stagingDir = "mini-os-$tag"

        # Create release directory structure
        New-Item -ItemType Directory -Force -Path `
            "$stagingDir\distro\mbr", `
            "$stagingDir\vhd", `
            "$stagingDir\setup-vm", `
            "$stagingDir\tools" | Out-Null

        # Copy artifacts
        Copy-Item "build\boot\mbr.bin"       "$stagingDir\distro\mbr\"
        Copy-Item "build\boot\mini-os.vhd"   "$stagingDir\vhd\"
        Copy-Item "tools\setup-vm.ps1"        "$stagingDir\setup-vm\"
        Copy-Item "tools\create-vhd.ps1"      "$stagingDir\tools\"
        Copy-Item "tools\create-vhd.bat"      "$stagingDir\tools\"

        # Create setup-vm.bat for release (adjusted paths — self-contained)
        @"
        @echo off
        cd /d "%~dp0"
        where pwsh >nul 2>&1
        if errorlevel 1 (
            echo ERROR: PowerShell 7 is not installed. Install from: https://aka.ms/powershell
            exit /b 1
        )
        pwsh -NoProfile -ExecutionPolicy Bypass -File "setup-vm.ps1"
        "@ | Set-Content "$stagingDir\setup-vm\setup-vm.bat"

        # Create README.txt
        @"
        mini-os $tag
        ============

        A minimalistic bootable OS that prints "mini-os" and halts.

        CONTENTS
        --------
        distro\mbr\mbr.bin    Raw 512-byte MBR boot sector
        vhd\mini-os.vhd       16 MB fixed VHD — ready to boot in Hyper-V
        setup-vm\             Scripts to create/update a Hyper-V VM
        tools\                VHD creation tools (if you rebuild from source)

        QUICK START
        -----------
        1. Open an elevated PowerShell 7 prompt:
             Right-click Start -> Terminal (Admin)

        2. Navigate to the setup-vm folder and run:
             cd setup-vm
             .\setup-vm.bat

        3. Follow the prompts (defaults are fine).

        4. Start the VM:
             Start-VM -Name 'mini-os'
             vmconnect localhost 'mini-os'

        5. You should see "mini-os" printed on screen.

        PREREQUISITES
        -------------
        - Windows 10/11 with Hyper-V enabled
        - PowerShell 7+  (https://aka.ms/powershell)

        SOURCE CODE
        -----------
        https://github.com/ambaner/mini-os

        LICENSE
        -------
        MIT — see LICENSE in the source repository.
        "@ | Set-Content "$stagingDir\README.txt"

        # Create zip
        Compress-Archive -Path "$stagingDir\*" -DestinationPath "$stagingDir.zip" -Force

        Write-Host "Release package: $stagingDir.zip"
        Get-ChildItem "$stagingDir" -Recurse -Name | ForEach-Object { Write-Host "  $_" }

    - name: Upload release artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-package
        path: mini-os-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Download release artifact
      uses: actions/download-artifact@v4
      with:
        name: release-package

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: mini-os-*.zip
        generate_release_notes: true
