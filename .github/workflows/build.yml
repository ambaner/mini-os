name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup NASM
      uses: ilammy/setup-nasm@v1

    - name: Build mini-os
      run: .\build.bat
      shell: cmd

    - name: Verify build outputs
      shell: pwsh
      run: |
        $mbr = "build\boot\mbr.bin"
        $vbr = "build\boot\vbr.bin"
        $img = "build\boot\mini-os.img"
        $vhd = "build\boot\mini-os.vhd"

        # Check all files exist
        foreach ($f in @($mbr, $vbr, $img, $vhd)) {
            if (-not (Test-Path $f)) { throw "$f not found" }
        }

        # MBR: 512 bytes + boot signature
        $mbrBytes = [System.IO.File]::ReadAllBytes($mbr)
        if ($mbrBytes.Length -ne 512) { throw "mbr.bin is $($mbrBytes.Length) bytes (expected 512)" }
        if ($mbrBytes[510] -ne 0x55 -or $mbrBytes[511] -ne 0xAA) {
            throw "MBR boot signature missing"
        }

        # VBR: 512 bytes + boot signature + MNOS header
        $vbrBytes = [System.IO.File]::ReadAllBytes($vbr)
        if ($vbrBytes.Length -ne 512) { throw "vbr.bin is $($vbrBytes.Length) bytes (expected 512)" }
        if ($vbrBytes[510] -ne 0x55 -or $vbrBytes[511] -ne 0xAA) {
            throw "VBR boot signature missing"
        }
        $magic = [System.Text.Encoding]::ASCII.GetString($vbrBytes, 3, 4)
        if ($magic -ne 'MNOS') {
            throw "VBR magic is '$magic' (expected 'MNOS')"
        }
        $bootSectors = [BitConverter]::ToUInt16($vbrBytes, 7)
        if ($bootSectors -lt 1 -or $bootSectors -gt 128) {
            throw "VBR boot sectors = $bootSectors (expected 1-128)"
        }

        # Disk image: partition table present
        $imgBytes = [System.IO.File]::ReadAllBytes($img)
        if ($imgBytes[0x1BE] -ne 0x80) { throw "Partition 1 not marked active in disk image" }
        if ($imgBytes[0x1C2] -eq 0x00) { throw "Partition 1 type is 0x00 (empty) in disk image" }

        # VHD footer
        $vhdBytes = [System.IO.File]::ReadAllBytes($vhd)
        $footerStart = $vhdBytes.Length - 512
        $cookie = [System.Text.Encoding]::ASCII.GetString($vhdBytes, $footerStart, 8)
        if ($cookie -ne 'conectix') {
            throw "VHD footer cookie is '$cookie' (expected 'conectix')"
        }

        Write-Host "Build verification passed:"
        Write-Host "  mbr.bin      : $($mbrBytes.Length) bytes, signature OK"
        Write-Host "  vbr.bin      : $($vbrBytes.Length) bytes, signature OK, magic MNOS, boot sectors $bootSectors"
        Write-Host "  mini-os.img  : $($imgBytes.Length) bytes, partition table OK"
        Write-Host "  mini-os.vhd  : $($vhdBytes.Length) bytes, VHD footer OK"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mini-os-build
        path: |
          build/boot/mbr.bin
          build/boot/vbr.bin
          build/boot/mini-os.vhd
        retention-days: 30
